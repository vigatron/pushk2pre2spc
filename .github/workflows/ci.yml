name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: Получаем код
      - name: Checkout repository
        uses: actions/checkout@v3

      # Шаг 2: Устанавливаем зависимости (если нужны)
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake

      # Шаг 3: Сборка проекта
      - name: Build project
        run: |
          mkdir build
          cd build
          cmake ..
          make

      # Шаг 4: Запуск unittest
      - name: Run Python tests
        run: |
          cd tests
          python3 -m unittest unittest1.py
